<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title>{{ exercise.name }}</mat-card-title>
    <mat-card-subtitle>{{ exercise.primaryMuscles[0] }} · {{ exercise.level }} </mat-card-subtitle>
  </mat-card-header>
  <img
  mat-card-image
  [src]="'assets/exercises/' + exercise.images[0]"
  [alt]="'Photo of ' + exercise.name"
  />

  <mat-card-content>
    <p>
      Equipment: {{ exercise.equipment || 'No equipment' }}
    </p>
    <p>
      Category: {{ exercise.category }}
    </p>
    <p>
      Instructions: {{ exercise.instructions }}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton>LIKE</button>
    <button matButton>SHARE</button>
  </mat-card-actions>
</mat-card>
