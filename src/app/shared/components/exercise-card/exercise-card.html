<mat-card class="exercise-card" appearance="outlined">
  <mat-card-header>
    <!-- <div mat-card-avatar class="exercise-header-image"></div> -->
    <mat-card-title>{{ exercise.name }}</mat-card-title>
    <mat-card-subtitle>{{ exercise.primaryMuscles[0] | capitalize }} · {{ exercise.level | capitalize }} </mat-card-subtitle>
  </mat-card-header>
  <img
  mat-card-image
  [src]="'assets/exercises/' + exercise.images[0]"
  [alt]="'Photo of ' + exercise.name"
  />

  <mat-card-content>
    <p>
          <strong class="label">Equipment: </strong>
          {{ exercise.equipment | capitalize }}
    </p>
    <p>
          <strong class="label">Category: </strong>
          {{ exercise.category | capitalize }}
    </p>
    <p class="instructions">
      <strong class="label">Instructions: </strong>
      {{ exercise.instructions }}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton>LIKE</button>
    <button matButton>SHARE</button>
  </mat-card-actions>
</mat-card>
